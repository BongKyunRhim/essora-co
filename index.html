<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESSORA</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        color: #1a1a1a;
      }

      /* Navigation bar */
      .navbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 1.25rem 2.5rem;
        border-bottom: 1px solid #e5e5e5;
        background: #ffffff;
      }

      .navbar .nav-left,
      .navbar .nav-right {
        display: flex;
        gap: 2rem;
      }

      .navbar .nav-right {
        justify-content: flex-end;
      }

      .navbar a {
        text-decoration: none;
        color: #444;
        font-size: 0.9rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        transition: color 0.2s ease;
      }

      .navbar a:hover {
        color: #000;
      }

      /* Centered brand */
      .navbar .brand {
        text-align: center;
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: 0.35em;
        color: #000;
        text-decoration: none;
        padding-left: 0.35em; /* optical centering for letter-spacing */
      }

      /* Simple responsive fallback */
      @media (max-width: 640px) {
        .navbar {
          grid-template-columns: 1fr;
          justify-items: center;
          gap: 1rem;
          text-align: center;
        }
        .navbar .nav-left,
        .navbar .nav-right {
          justify-content: center;
          order: 2;
        }
        .navbar .brand {
          order: 1;
        }
      }

      main {
        padding: 3rem 2.5rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <a href="#shop">Shop</a>
        <a href="#collections">Collections</a>
      </div>

      <a href="#" class="brand">ESSORA</a>

      <div class="nav-right">
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>

    <main>
      <h1>Welcome to ESSORA</h1>
    </main>
  </body>
</html>
